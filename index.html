<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幸運拉霸機 🎰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400;1,600&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-en">Lucky Slot Machine</div>
    <h1 class="brand">
      <span class="cloud"></span>
      幸運拉霸
      <span class="cloud"></span>
    </h1>
    <div class="brand-sub">
      拉<span class="divider">・</span>一<span class="divider">・</span>拉<span class="divider">・</span>手<span class="divider">・</span>氣
    </div>
  </header>

  <main class="layout">
    <!-- 左側：設定區 -->
    <aside class="panel panel-config">
      <section class="card">
        <h2 class="card-title">
          <span class="emoji">📝</span>
          參加者名單
          <span class="num">01</span>
        </h2>
        <p class="hint">一行一個名字，空白行會自動忽略（支援直接從 FB 留言複製貼上）</p>
        <textarea
          id="participants"
          placeholder="王小明&#10;陳美麗&#10;林大華&#10;張雅婷&#10;李志強"
          spellcheck="false"
        ></textarea>
        <div class="meta">
          <span><span id="participant-count">0</span> 位參加者</span>
          <button class="ghost-btn" id="clear-participants" type="button">清空</button>
        </div>
      </section>

      <section class="card">
        <h2 class="card-title">
          <span class="emoji">🎁</span>
          獎項設定
          <span class="num">02</span>
        </h2>
        <div id="prizes-list" class="prizes-list"></div>
        <button class="add-prize-btn" id="add-prize" type="button">
          <span>＋</span> 新增獎項
        </button>
      </section>

      <section class="card card-actions">
        <button class="primary-btn" id="start-draw" type="button" disabled>
          開始抽獎
        </button>
        <button class="ghost-btn full" id="reset-all" type="button">重置全部</button>
      </section>
    </aside>

    <!-- 右側：拉霸機 -->
    <section class="panel panel-machine">
      <div class="machine">
        <!-- 招牌 -->
        <div class="machine-top">
          <div class="mascot">🐯</div>
          <div class="marquee">
            <div class="marquee-title">
              <span class="deco"></span>
              JACKPOT
              <span class="deco"></span>
            </div>
            <div id="current-prize" class="current-prize">請設定獎項並拉下拉桿</div>
          </div>
          <div class="mascot right">🪷</div>
        </div>

        <!-- 滾輪 -->
        <div class="machine-body">
          <div class="reels-frame" id="reels-frame">
            <div class="reel-window" id="window-1">
              <div class="reel" id="reel-1">
                <div class="reel-track">
                  <div class="reel-item">❓</div>
                </div>
              </div>
            </div>
            <div class="reel-window" id="window-2">
              <div class="reel" id="reel-2">
                <div class="reel-track">
                  <div class="reel-item">❓</div>
                </div>
              </div>
            </div>
            <div class="reel-window" id="window-3">
              <div class="reel" id="reel-3">
                <div class="reel-track">
                  <div class="reel-item">❓</div>
                </div>
              </div>
            </div>
            <div class="payline" id="payline"></div>
          </div>

          <div class="result-display" id="result-display">
            <div class="result-label">WINNER<span class="zh">・中獎者</span></div>
            <div class="result-name" id="result-name">— — —</div>
          </div>
        </div>

        <!-- 拉桿 -->
        <div class="machine-bottom">
          <div class="machine-label">
            <span class="dot"></span>
            READY
          </div>
          <button class="lever" id="lever" type="button" aria-label="拉桿">
            <div class="lever-ball"></div>
            <div class="lever-stick"></div>
            <div class="lever-base"></div>
          </button>
        </div>
      </div>

      <!-- 中獎名單 -->
      <div class="winners-panel">
        <div class="winners-header">
          <h3>中獎名單</h3>
          <button class="ghost-btn" id="copy-winners" type="button" disabled>複製名單</button>
        </div>
        <div id="winners-list" class="winners-list">
          <div class="empty-state">尚未開獎</div>
        </div>
      </div>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-hidden="true"></div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
